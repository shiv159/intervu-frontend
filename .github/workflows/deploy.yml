name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GAR_LOCATION: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intervu/frontend
  SERVICE_NAME: intervu-frontend

jobs:
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx ng test --watch=false

      - name: Build production bundle
        run: npm run build -- --configuration=production

  deploy:
    name: Deploy to Cloud Run
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      service_url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required Google Cloud APIs
        run: |
          gcloud services enable \
            artifactregistry.googleapis.com \
            run.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe intervu \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --location=${{ secrets.GCP_REGION }} 2>/dev/null || \
          gcloud artifacts repositories create intervu \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --location=${{ secrets.GCP_REGION }} \
            --repository-format=docker \
            --description="Intervu container images"

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="BACKEND_URL=${{ secrets.BACKEND_URL }}" \
            --quiet

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION }} \
            --format='value(status.url)')
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Frontend deployed at: $SERVICE_URL"

      - name: Verify deployment
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.service_url }}"
          echo "Checking frontend health at $SERVICE_URL/healthz ..."

          for i in 1 2 3 4 5; do
            if curl -sf "$SERVICE_URL/healthz"; then
              echo ""
              echo "Frontend is healthy!"
              echo "Frontend URL: $SERVICE_URL"
              exit 0
            fi
            echo "Attempt $i/5 - waiting 10s..."
            sleep 10
          done

          echo "Health check did not pass after 5 attempts"
          exit 1

      - name: Post-deploy reminder
        run: |
          echo ""
          echo "Reminder: update the backend's CORS_ALLOWED_ORIGINS secret"
          echo "to include this frontend URL:"
          echo "  ${{ steps.deploy.outputs.service_url }}"
          echo ""
          echo "Then re-deploy the backend, or run:"
          echo "gcloud run services update intervu-backend \\"
          echo "  --region=${{ secrets.GCP_REGION }} \\"
          echo "  --update-env-vars=^@^INTERVU_CORS_ALLOWED_ORIGINS=${{ steps.deploy.outputs.service_url }},http://localhost:4200"
